# ============================================================
# Text Polarity Classification - Central Config
# ============================================================

# ------------------------------------------------------------
# 全域設定
# ------------------------------------------------------------
global:
  random_seed: 42
  n_jobs: -1
  device: auto              # auto = cuda（若可用），否則退回 cpu

# ------------------------------------------------------------
# 資料路徑
# ------------------------------------------------------------
paths:
  train:             datasets/train_2022.csv
  test:              datasets/test_2022.csv
  sample_submission: datasets/sample_submission.csv
  models_dir:        models

# ------------------------------------------------------------
# 當前實驗
# ------------------------------------------------------------
experiment:
  id:   exp_025_holdout_raw2022
  name: Stacking 3 models + XGBoost + L2 LogReg + no DR + NLPaug + GroupKFold OOF base + holdout val meta

# ------------------------------------------------------------
# 前處理
# ------------------------------------------------------------
preprocessing:
  track_a:
    lrb_token:       "-lrb-"
    rrb_token:       "-rrb-"
    keep_only_alpha: true

  track_b:
    lrb_replace:      "("
    rrb_replace:      ")"
    keep_punctuation: true

  special_tokens:
    num_token:    "num_num"
    extend_token: "num_extend"

# ------------------------------------------------------------
# 特徵工程
# ------------------------------------------------------------
features:
  meta:
    use_question_mark: true
    use_exclaim_mark:  true
    use_vader:         false

  sentence_transformer:
    batch_size: 32

# ------------------------------------------------------------
# 模型參數
# ------------------------------------------------------------
models:
  # Base classifier 1：XGBoost（Optuna 調參，exp_015）
  xgboost:
    n_estimators:     503
    learning_rate:    0.0239
    max_depth:        5
    random_state:     42
    eval_metric:      logloss
    device:           cuda
    subsample:        0.697
    colsample_bytree: 0.964
    reg_alpha:        0.0023
    reg_lambda:       1.5346

  # Base classifier 2：L2 Logistic Regression
  logreg_base:
    C:        1.0
    max_iter: 1000

# ------------------------------------------------------------
# Stacking
# ------------------------------------------------------------
stacking:
  cv_folds: 5
  base_models:
    - id:         mpnet
      model_name: all-mpnet-base-v2
    - id:         cardiffnlp
      model_name: cardiffnlp/twitter-roberta-base-sentiment-latest
    - id:         bge_large
      model_name: BAAI/bge-large-en-v1.5
  meta_model:
    type:     logistic_regression
    C:        1.0
    max_iter: 1000

# ------------------------------------------------------------
# 降維（method: none = 不降維；pca = PCA 降維）
# ------------------------------------------------------------
dimension_reduction:
  method:       none
  n_components: 32

# ------------------------------------------------------------
# 訓練評估
# ------------------------------------------------------------
evaluation:
  val_ratio: 0.2
